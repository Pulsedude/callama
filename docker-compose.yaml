services:
  app:
    # build: .
    image: raunaksharma/callama:latest
    ports:
      - "3000:3000"
    
    depends_on:
      - ollama
    
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL: gpt-oss:120b-cloud
      
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: